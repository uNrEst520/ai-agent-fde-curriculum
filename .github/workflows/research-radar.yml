name: Weekly research radar

on:
  schedule:
    - cron: "20 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch research candidates
        run: python scripts/update_research_radar.py
      - name: Check for changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- research/radar/latest.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create review pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          branch="automation/research-radar-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add research/radar/latest.md
          git commit -m "chore: update weekly research radar"
          git push origin "$branch"
          gh pr create \
            --title "chore: weekly AI Agent research radar" \
            --body "自动生成的论文候选清单，请按研究转化流程人工评审。自动出现不代表进入正式课程。" \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch"
