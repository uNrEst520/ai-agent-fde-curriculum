name: Course Change RFC
description: 提议增加、删除或替换正式课程内容
title: "[Course RFC] "
labels:
  - curriculum
body:
  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 说明现有课程在哪个能力目标、先修关系或学习效果上存在问题。
    validations:
      required: true
  - type: input
    id: affected
    attributes:
      label: 影响单元与能力标签
      placeholder: "Week 07; AGENT, EVAL"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 证据
      description: 提供原始来源、学习者反馈、实验或失效信息。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明增加、删除或替换什么，以及新的验收方式。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与取舍
    validations:
      required: true
  - type: textarea
    id: migration
    attributes:
      label: 对正在学习者的影响
      description: 是否改变先修、预计时间、作业或毕业标准。
